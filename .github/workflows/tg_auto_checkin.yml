name: Telegram Auto Checkin (Smart Random)

on:
  schedule:
    - cron: "*/35 * * * *" # 降低触发频率：每35分钟一次（每天仅41次）
  workflow_dispatch: # 手动触发测试

env:
  TIMEZONE: "Asia/Shanghai"
  BASE_HOUR_START: ${{ secrets.BASE_HOUR_START || 9 }} # 起始小时（默认9点）
  BASE_HOUR_END: ${{ secrets.BASE_HOUR_END || 14 }} # 结束小时（默认14点）

jobs:
  smart_random_checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 5 # 单次运行最长5分钟

    steps:
      # 步骤1：生成当日唯一标识（缓存/种子用）
      - name: Generate today key
        id: date
        run: |
          TODAY=$(TZ=${{ env.TIMEZONE }} date +"%Y-%m-%d")
          TODAY_NUM=$(TZ=${{ env.TIMEZONE }} date +"%Y%m%d")
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          echo "today_num=$TODAY_NUM" >> $GITHUB_OUTPUT
          echo "CACHE_KEY=tg-checkin-$TODAY" >> $GITHUB_OUTPUT # 预计算缓存key

      # 步骤2：缓存防重复（当日仅发送1次）
      - name: Cache checkin status
        id: cache-status
        uses: actions/cache@v3
        with:
          path: ~/tg_checkin_flag
          key: ${{ steps.date.outputs.CACHE_KEY }} # 使用预计算的key
          restore-keys: |
            ${{ steps.date.outputs.CACHE_KEY }}

      # 步骤3：检查并跳过（核心修复：直接在shell中判断文件是否存在）
      - name: Skip if already sent
        run: |
          if [ -f ~/tg_checkin_flag/sent.today ]; then
            echo "✅ 检测到标记文件，今日已发送，跳过本次触发"
            exit 0
          else
            echo "⏳ 未检测到标记文件，今日尚未发送"
          fi

      # 步骤4：计算当日目标时间窗口+判断执行逻辑
      - name: Calculate target window & check execution logic
        id: window
        run: |
          # 基础配置
          TZ=${{ env.TIMEZONE }}
          BASE_START=${{ env.BASE_HOUR_START }}
          BASE_END=${{ env.BASE_HOUR_END }}
          TODAY_NUM=${{ steps.date.outputs.today_num }}

          # 新增：获取仓库唯一标识并转为哈希值（每个fork不同）
          REPO_ID=${{ github.repository }}
          REPO_HASH=$(echo -n "$REPO_ID" | cksum | cut -d' ' -f1)
          echo "🔍 仓库唯一标识：$REPO_ID → 哈希值：$REPO_HASH"

          # 当前时间（强制转十进制，避免0开头八进制问题）
          CURRENT_HOUR=$((10#$(TZ=$TZ date +"%H")))
          CURRENT_MINUTE=$((10#$(TZ=$TZ date +"%M")))

          # 优化种子：当日日期 + 仓库哈希值（确保不同用户随机结果不同）
          SEED=$(( TODAY_NUM + REPO_HASH ))
          # 粗粒度随机：锁定当日目标小时+10分钟段
          HOUR_RANGE=$(( BASE_END - BASE_START + 1 ))
          TARGET_HOUR=$(( BASE_START + SEED % HOUR_RANGE ))          # 随机小时（9-14）
          TARGET_TEN_MINUTE=$(( (SEED + 1) % 6 ))                  # 随机10分钟段（0-5）
          TARGET_WINDOW_START=$(( TARGET_TEN_MINUTE * 10 ))         # 窗口起始分钟
          TARGET_WINDOW_END=$(( TARGET_WINDOW_START + 9 ))          # 窗口结束分钟

          # 输出关键信息
          echo "🎯 今日目标窗口：$TARGET_HOUR点 $TARGET_WINDOW_START-$TARGET_WINDOW_END 分"
          echo "⏰ 当前时间：$CURRENT_HOUR点 $CURRENT_MINUTE 分"

          # 传递基础信息到后续步骤
          echo "TARGET_HOUR=$TARGET_HOUR" >> $GITHUB_OUTPUT
          echo "TARGET_WINDOW_START=$TARGET_WINDOW_START" >> $GITHUB_OUTPUT
          echo "TARGET_WINDOW_END=$TARGET_WINDOW_END" >> $GITHUB_OUTPUT
          echo "REPO_HASH=$REPO_HASH" >> $GITHUB_OUTPUT

          # 核心逻辑判断：
          # 1. 若在目标窗口内 → 正常执行（带随机等待）
          # 2. 若目标窗口已过期 → 补签（立即发送，无等待）
          # 3. 若目标窗口未到 → 跳过
          if [ $CURRENT_HOUR -eq $TARGET_HOUR ] && \
             [ $CURRENT_MINUTE -ge $TARGET_WINDOW_START ] && \
             [ $CURRENT_MINUTE -le $TARGET_WINDOW_END ]; then
            echo "✅ 进入目标窗口，将执行正常随机发送"
            echo "need_exec=true" >> $GITHUB_OUTPUT
            echo "is_retry=false" >> $GITHUB_OUTPUT
          elif [ $CURRENT_HOUR -gt $TARGET_HOUR ] || \
               ([ $CURRENT_HOUR -eq $TARGET_HOUR ] && [ $CURRENT_MINUTE -gt $TARGET_WINDOW_END ]); then
            echo "⚠️  目标窗口已过期且未发送，执行补签"
            echo "need_exec=true" >> $GITHUB_OUTPUT
            echo "is_retry=true" >> $GITHUB_OUTPUT
          else
            echo "⏰ 目标窗口未到，跳过本次触发"
            echo "need_exec=false" >> $GITHUB_OUTPUT
            echo "is_retry=false" >> $GITHUB_OUTPUT
            exit 0
          fi

      - name: Checkout the repository
        if: steps.window.outputs.need_exec == 'true'
        uses: actions/checkout@v6

      # 步骤5：执行Python脚本（区分正常执行/补签）
      - name: Run Python script (normal/retry)
        if: steps.window.outputs.need_exec == 'true'
        env:
          # 传递窗口信息、仓库哈希、补签标识给Python
          TARGET_HOUR: ${{ steps.window.outputs.TARGET_HOUR }}
          TARGET_WINDOW_START: ${{ steps.window.outputs.TARGET_WINDOW_START }}
          TARGET_WINDOW_END: ${{ steps.window.outputs.TARGET_WINDOW_END }}
          REPO_HASH: ${{ steps.window.outputs.REPO_HASH }}
          IS_RETRY: ${{ steps.window.outputs.is_retry }}
          # TG核心配置（仅传递Secrets，默认值由Python处理）
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION_STRING: ${{ secrets.TG_SESSION_STRING }}
          TG_TARGET_USER: ${{ secrets.TG_TARGET_USER }}
          TG_MESSAGE: ${{ secrets.TG_MESSAGE }}
        run: |
          # 安装依赖（指定版本，避免兼容问题）
          python -m pip install --upgrade pip
          pip install pyrogram==2.0.106 tgcrypto==1.2.5 pytz

          # 运行发送脚本
          echo "🚀 启动Telegram发送脚本（补签模式：$IS_RETRY）"
          python tg_auto_send.py

          # 仅脚本执行成功时标记缓存
          if [ $? -eq 0 ]; then
            mkdir -p ~/tg_checkin_flag
            touch ~/tg_checkin_flag/sent.today
            echo "✅ 消息发送成功，标记当日已完成"
          else
            echo "❌ 消息发送失败，不标记缓存（后续可重试）"
            exit 1
          fi
      # 步骤6：标记缓存（保持不变）
      - name: Mark cache as sent
        if: steps.window.outputs.need_exec == 'true' && success()
        run: |
          mkdir -p ~/tg_checkin_flag
          touch ~/tg_checkin_flag/sent.today
          echo "✅ 已创建标记文件，标记当日已完成"

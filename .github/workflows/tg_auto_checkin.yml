# tg_auto_checkin.yml - GitHub定时签到配置
name: Telegram Auto Checkin

# 定时触发（UTC时间，转换为你的目标时间）
# 示例：每天北京时间9点 = UTC 1点 → cron: "0 1 * * *"
# 示例：每天英国时间9点 = UTC 9点 → cron: "0 9 * * *"
on:
  schedule:
    - cron: "0 1 * * *"  # 按需修改定时时间
  # 手动触发（测试用）
  workflow_dispatch:

jobs:
  send_checkin:
    runs-on: ubuntu-latest  # 境外服务器，无需代理
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run checkin script
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION_STRING: ${{ secrets.TG_SESSION_STRING }}
          TG_TARGET_USER: ${{ secrets.TG_TARGET_USER }}
          TG_MESSAGE: ${{ secrets.TG_MESSAGE }}
        run: |
          python tg_auto_send.py
